<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Register — KeyLock </title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<nav class="navbar">
    <div class="logo"><div class="logo-icon">🔐</div>KEYLOCK </div>
    <div class="nav-links">
        <a href="/login" class="nav-btn">Sign In</a>
    </div>
</nav>

<div class="auth-wrap">
    <div class="auth-box">
        <div class="auth-title">Create Account</div>
        <div class="auth-sub">Register to access the secure file exchange platform</div>

        <!-- Error Message -->
        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

        <form th:action="@{/register}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="name" placeholder="e.g. Swetha S" required/>
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="you@example.com" required/>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Min. 8 characters" minlength="8" required/>
            </div>

            <div class="form-group">
                <label>Select Your Role</label>
                <div class="role-select">
                    <div class="role-card" id="role-admin-card" onclick="selectRole('ADMIN')">
                        <div class="ri">👑</div>
                        <span>Admin</span>
                        <small>Upload &amp; manage files</small>
                    </div>
                    <div class="role-card" id="role-employee-card" onclick="selectRole('EMPLOYEE')">
                        <div class="ri">👤</div>
                        <span>Employee</span>
                        <small>View &amp; download files</small>
                    </div>
                </div>
                <input type="hidden" name="role" id="roleInput" required/>
            </div>

            <button type="submit" class="btn btn-primary">Create Account &amp; Get RSA Key</button>
        </form>

        <div class="auth-footer">
            Already have an account? <a href="/login">Sign in</a>
        </div>
    </div>
</div>

<script>
function selectRole(role) {
    document.getElementById('roleInput').value = role;
    document.getElementById('role-admin-card').classList.toggle('selected', role === 'ADMIN');
    document.getElementById('role-employee-card').classList.toggle('selected', role === 'EMPLOYEE');
}
</script>
</body>
</html>

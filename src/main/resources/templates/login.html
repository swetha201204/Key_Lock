<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Login — KeyLock </title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<nav class="navbar">
    <div class="logo"><div class="logo-icon">🔐</div>KEYLOCK </div>
    <div class="nav-links">
        <a href="/register" class="nav-btn primary">Register</a>
    </div>
</nav>

<div class="auth-wrap">
    <div class="auth-box">
        <div class="auth-title">Welcome Back</div>
        <div class="auth-sub">Sign in to your secure workspace</div>

        <!-- Error Message -->
        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

        <!-- Logout / Success Message -->
        <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>

        <form th:action="@{/login}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="username" placeholder="you@example.com" required autofocus/>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Your password" required/>
            </div>

            <button type="submit" class="btn btn-primary">Sign In Securely 🔐</button>
        </form>

        <div class="auth-footer">
            No account yet? <a href="/register">Register here</a>
        </div>
    </div>
</div>

</body>
</html>
